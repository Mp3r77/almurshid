name: untitled1
description: "Al Murshid - Healthcare Companion App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.0
  
  # State Management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.4
  equatable: ^2.0.5
  
  # Network
  dio: ^5.9.2
  connectivity_plus: ^6.1.1
  
  # Dependency Injection
  get_it: ^8.3.0
  injectable: ^2.5.1
  
  # Functional Programming
  dartz: ^0.10.1
  
  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  
  # Utilities
  device_preview: ^1.2.0
  shared_preferences: ^2.5.3
  image_picker: ^1.1.2
  record: ^6.2.0
  audioplayers: ^6.4.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  camera: ^0.11.0+2
  file_picker: ^11.0.2
  http: ^1.6.0
  flutter_dotenv: ^5.1.0
  cached_network_image: ^3.4.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  iconify_flutter: ^0.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  injectable_generator: ^2.6.2

flutter:
  generate: true
  uses-material-design: true
  
  assets:
    - .env
    - assets/logo.png
    - assets/onboarding_1.png
    - assets/onboarding_2.png
    - assets/onboarding_3.png
